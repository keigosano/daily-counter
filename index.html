<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Counter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c63ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Counter">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface-2: #252540;
    --accent: #7b6fff;
    --accent-glow: rgba(123, 111, 255, 0.4);
    --accent-light: #a89eff;
    --success: #34d399;
    --success-glow: rgba(52, 211, 153, 0.35);
    --warn: #fbbf24;
    --text: #ffffff;
    --text-sub: #c0c0d0;
    --text-dim: #9090aa;
    --border: #303050;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px 80px;
    padding-top: calc(24px + env(safe-area-inset-top));
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
    padding-left: calc(20px + env(safe-area-inset-left));
    padding-right: calc(20px + env(safe-area-inset-right));
  }

  header { text-align: center; margin-bottom: 28px; }

  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, var(--accent-light), var(--success));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .card-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    margin-bottom: 16px;
  }

  .full-width { grid-column: 1 / -1; }

  /* ── Counter ── */
  .counter-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .count-ring {
    position: relative;
    width: 200px;
    height: 200px;
    flex-shrink: 0;
  }

  .count-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .count-ring .track { fill: none; stroke: var(--surface-2); stroke-width: 8; }

  .count-ring .progress {
    fill: none;
    stroke: url(#grad);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .count-ring .overflow-ring {
    fill: none;
    stroke: url(#grad-over);
    stroke-width: 4;
    stroke-linecap: round;
    opacity: 0;
    transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
  }

  .count-ring .overflow-ring.visible { opacity: 1; }

  .count-ring .center-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .count-ring .count-value {
    font-size: 3rem;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: #fff;
  }

  .count-ring .count-goal {
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-top: 4px;
  }

  .counter-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .btn-count {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), #9b8fff);
    color: #fff;
    font-size: 2.5rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 0 40px var(--accent-glow);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn-count:hover { transform: scale(1.06); box-shadow: 0 0 60px var(--accent-glow); }
  .btn-count:active { transform: scale(0.94); }
  .btn-count.achieved {
    background: linear-gradient(135deg, var(--success), #22c55e);
    box-shadow: 0 0 40px var(--success-glow);
  }
  .btn-count.achieved:hover { box-shadow: 0 0 60px var(--success-glow); }

  .btn-small {
    padding: 8px 20px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-sub);
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-small:hover { background: var(--border); color: #fff; }

  .counter-btns-row { display: flex; gap: 8px; }

  .goal-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .goal-bar label { font-size: 0.85rem; color: var(--text-sub); }

  .goal-input {
    width: 80px;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: #fff;
    font-size: 1rem;
    text-align: center;
    outline: none;
  }
  .goal-input:focus { border-color: var(--accent); }

  /* ── Rank Badge ── */
  .rank-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .rank-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
  }

  .rank-icon { font-size: 1.3rem; }

  .rank-info { display: flex; flex-direction: column; }

  .rank-name {
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
  }

  .rank-sub {
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .pts-display {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .pts-val {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--warn);
    font-variant-numeric: tabular-nums;
  }

  .pts-label {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .xp-bar-wrap {
    flex: 1;
    min-width: 100px;
    max-width: 200px;
  }

  .xp-bar-label {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  .xp-bar {
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
  }

  .xp-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--success));
    transition: width 0.5s ease;
  }

  /* ── Calendar ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .cal-nav button {
    background: none;
    border: none;
    color: var(--text-sub);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .cal-nav button:hover { background: var(--surface-2); }

  .cal-nav .cal-month { font-size: 1rem; font-weight: 600; color: #fff; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align: center;
  }

  .cal-dow {
    font-size: 0.7rem;
    color: var(--text-dim);
    padding: 4px 0;
    font-weight: 600;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    border-radius: 8px;
    color: var(--text-sub);
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .cal-day:hover { background: var(--surface-2); }
  .cal-day.today {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
    color: #fff;
    font-weight: 700;
  }
  .cal-day.achieved {
    background: var(--success);
    color: #0f0f13;
    font-weight: 700;
  }
  .cal-day.achieved:hover { background: #2bc47a; }
  .cal-day.partial {
    background: var(--surface-2);
    color: #fff;
  }
  .cal-day.empty { visibility: hidden; cursor: default; }

  /* ── Stats Dashboard ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    text-align: center;
  }

  .stat-box .stat-val {
    font-size: 1.6rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: #fff;
  }

  .stat-box .stat-label {
    font-size: 0.7rem;
    color: var(--text-sub);
    margin-top: 2px;
  }

  .stat-box.accent .stat-val { color: var(--accent-light); }
  .stat-box.success .stat-val { color: var(--success); }
  .stat-box.warn .stat-val { color: var(--warn); }

  .chart-container {
    width: 100%;
    height: 180px;
    position: relative;
  }
  .chart-container canvas { width: 100% !important; height: 100% !important; }

  /* ── History List ── */
  .history-list {
    max-height: 300px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    transition: background 0.15s;
    cursor: pointer;
  }
  .history-item:hover { background: var(--surface-2); }

  .history-item .hi-date { font-size: 0.85rem; font-weight: 600; color: #fff; }
  .history-item .hi-count { font-size: 0.85rem; color: var(--text-sub); }

  .history-item .hi-badge {
    font-size: 0.7rem;
    padding: 2px 10px;
    border-radius: 999px;
    font-weight: 600;
  }

  .hi-badge.achieved { background: rgba(52,211,153,0.2); color: var(--success); }
  .hi-badge.partial { background: rgba(123,111,255,0.2); color: var(--accent-light); }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    padding: 24px;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 320px;
    max-width: 90vw;
    transform: scale(0.9);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.open .modal { transform: scale(1); }

  .modal h3 {
    font-size: 1.1rem;
    margin-bottom: 8px;
    color: #fff;
  }

  .modal .modal-date {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .modal-count-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .modal-count-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .modal-count-btn:hover { background: var(--border); }

  .modal-count-val {
    font-size: 2.2rem;
    font-weight: 800;
    min-width: 80px;
    text-align: center;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  .modal-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .modal-btn {
    padding: 10px 24px;
    border-radius: 999px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .modal-btn:hover { opacity: 0.85; }

  .modal-btn.primary {
    background: var(--accent);
    color: #fff;
  }

  .modal-btn.secondary {
    background: var(--surface-2);
    color: var(--text-sub);
    border: 1px solid var(--border);
  }

  /* ── Celebration ── */
  .celebration { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

  .confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confetti-fall 1.5s ease-out forwards;
  }

  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(60vh) rotate(720deg) scale(0.3); }
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-120%);
    background: var(--success);
    color: #0f0f13;
    padding: 12px 28px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.95rem;
    box-shadow: 0 8px 30px var(--success-glow);
    z-index: 400;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Daily Counter</h1>
  </header>

  <div class="grid">
    <div class="card full-width">
      <div class="counter-display">
        <div class="count-ring">
          <svg viewBox="0 0 120 120">
            <defs>
              <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#7b6fff"/>
                <stop offset="100%" stop-color="#34d399"/>
              </linearGradient>
              <linearGradient id="grad-over" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fbbf24"/>
                <stop offset="100%" stop-color="#f97316"/>
              </linearGradient>
            </defs>
            <circle class="track" cx="60" cy="60" r="52"/>
            <circle class="progress" id="progressRing" cx="60" cy="60" r="52"
              stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
            <circle class="overflow-ring" id="overflowRing" cx="60" cy="60" r="44"
              stroke-dasharray="276.46" stroke-dashoffset="276.46"/>
          </svg>
          <div class="center-text">
            <div class="count-value" id="countValue">0</div>
            <div class="count-goal" id="countGoal">/ 50</div>
          </div>
        </div>
        <div class="counter-actions">
          <button class="btn-count" id="btnCount" aria-label="カウント追加">+1</button>
          <div class="counter-btns-row">
            <button class="btn-small" id="btnUndo">-1</button>
            <button class="btn-small" id="btnReset">リセット</button>
          </div>
        </div>
      </div>
      <div class="goal-bar">
        <label>目標</label>
        <input type="number" class="goal-input" id="goalInput" value="50" min="1" max="9999">
        <label>回</label>
        <button class="btn-small" id="btnGoalSave">保存</button>
      </div>
      <div class="rank-section">
        <div class="rank-badge">
          <span class="rank-icon" id="rankIcon">🌱</span>
          <div class="rank-info">
            <span class="rank-name" id="rankName">ビギナー</span>
            <span class="rank-sub" id="rankSub">Lv.1</span>
          </div>
        </div>
        <div class="pts-display">
          <span class="pts-val" id="ptsVal">0</span>
          <span class="pts-label">Points</span>
        </div>
        <div class="xp-bar-wrap">
          <div class="xp-bar-label">
            <span id="xpCurrent">0</span>
            <span id="xpNext">次のランクまで 100pt</span>
          </div>
          <div class="xp-bar">
            <div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">カレンダー</div>
      <div class="cal-nav">
        <button id="calPrev">&#8249;</button>
        <span class="cal-month" id="calMonth"></span>
        <button id="calNext">&#8250;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="card">
      <div class="card-title">統計</div>
      <div class="stats-row">
        <div class="stat-box accent">
          <div class="stat-val" id="statTotal">0</div>
          <div class="stat-label">累計達成</div>
        </div>
        <div class="stat-box success">
          <div class="stat-val" id="statStreak">0</div>
          <div class="stat-label">連続日数</div>
        </div>
        <div class="stat-box warn">
          <div class="stat-val" id="statBest">0</div>
          <div class="stat-label">最長連続</div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="chartCanvas"></canvas>
      </div>
    </div>

    <div class="card full-width">
      <div class="card-title">達成履歴</div>
      <div class="history-list" id="historyList">
        <div class="empty-state">まだ記録がありません</div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>記録を編集</h3>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-count-row">
      <button class="modal-count-btn" id="modalMinus">−</button>
      <div class="modal-count-val" id="modalCount">0</div>
      <button class="modal-count-btn" id="modalPlus">+</button>
    </div>
    <div class="modal-btns">
      <button class="modal-btn secondary" id="modalCancel">キャンセル</button>
      <button class="modal-btn primary" id="modalSave">保存</button>
    </div>
  </div>
</div>

<div class="celebration" id="celebration"></div>
<div class="toast" id="toast">目標達成!</div>

<script>
(function() {
  const STORAGE_KEY = 'daily-counter-data';
  const API_URL = 'https://daily-counter-api.keigosano.workers.dev';
  const API_KEY = 'd478b5c730338e8ba746fd1eee4649ef';
  const CIRC = 2 * Math.PI * 52;
  const CIRC_INNER = 2 * Math.PI * 44;
  const SYNC_INTERVAL = 12000;

  const $ = id => document.getElementById(id);

  // ── Rank System ──
  const RANKS = [
    { name: 'ビギナー',     icon: '🌱', minPts: 0 },
    { name: 'レギュラー',   icon: '⭐', minPts: 100 },
    { name: 'ブロンズ',     icon: '🥉', minPts: 300 },
    { name: 'シルバー',     icon: '🥈', minPts: 600 },
    { name: 'ゴールド',     icon: '🥇', minPts: 1000 },
    { name: 'プラチナ',     icon: '💎', minPts: 1800 },
    { name: 'マスター',     icon: '🔥', minPts: 3000 },
    { name: 'レジェンド',   icon: '👑', minPts: 5000 },
    { name: 'チャンピオン', icon: '🏆', minPts: 10000 },
  ];

  function getRank(pts) {
    let rank = RANKS[0], idx = 0;
    for (let i = RANKS.length - 1; i >= 0; i--) {
      if (pts >= RANKS[i].minPts) { rank = RANKS[i]; idx = i; break; }
    }
    const next = RANKS[idx + 1] || null;
    return { rank, idx, next };
  }

  function calcPoints(hist, goal) {
    let pts = 0;
    const sorted = Object.keys(hist).sort();
    let streak = 0;
    sorted.forEach(ds => {
      const cnt = hist[ds];
      if (cnt >= goal) {
        pts += 10;
        streak++;
        if (streak >= 7) pts += 5;
        if (streak >= 30) pts += 10;
      } else {
        if (cnt > 0) pts += 2;
        streak = 0;
      }
    });
    return pts;
  }

  // ── State ──
  let state = loadState();

  function defaultState() {
    return { goal: 50, today: todayStr(), count: 0, history: {} };
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const s = JSON.parse(raw);
      if (s.today !== todayStr()) {
        if (s.count > 0) s.history[s.today] = s.count;
        s.today = todayStr();
        s.count = 0;
      }
      return s;
    } catch { return defaultState(); }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // ── Cloud Sync ──
  async function apiGet(path) {
    try {
      const r = await fetch(`${API_URL}${path}`, { headers: { 'X-API-Key': API_KEY } });
      return await r.json();
    } catch { return null; }
  }

  async function apiPost(path, body) {
    try {
      const r = await fetch(`${API_URL}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
        body: JSON.stringify(body),
      });
      return await r.json();
    } catch { return null; }
  }

  /** クラウドとローカルを日付ごとに MAX でマージ（先にプッシュすると古い端末が上書きするバグを防ぐ） */
  async function mergeCloudIntoLocal() {
    const data = await apiGet('/counts');
    if (!data || !data.counts) return false;
    const cloud = data.counts;
    let changed = false;

    const allDates = new Set([...Object.keys(state.history), ...Object.keys(cloud)]);
    for (const date of allDates) {
      const a = state.history[date] || 0;
      const b = cloud[date] || 0;
      const m = Math.max(a, b);
      if (m > 0) {
        if (state.history[date] !== m) {
          state.history[date] = m;
          changed = true;
        }
      } else if (state.history[date]) {
        delete state.history[date];
        changed = true;
      }
    }

    const tc = cloud[state.today] || 0;
    const mergedToday = Math.max(state.count, state.history[state.today] || 0, tc);
    if (state.count !== mergedToday) {
      state.count = mergedToday;
      changed = true;
    }
    state.history[state.today] = state.count;

    if (data.goal != null && data.goal >= 1 && data.goal <= 9999) {
      const ng = Math.max(state.goal, data.goal);
      if (ng !== state.goal) {
        state.goal = ng;
        changed = true;
      }
    }

    if (changed) save();
    return changed;
  }

  async function syncToCloud(date, count) {
    await apiPost('/set', { date, count });
  }

  async function pushAllToCloud() {
    for (const [date, count] of Object.entries(state.history)) {
      if (count > 0) await apiPost('/set', { date, count });
    }
    await apiPost('/goal', { goal: state.goal });
  }

  async function syncGoalToCloud() {
    await apiPost('/goal', { goal: state.goal });
  }

  // ── Counter ──
  function updateCounter() {
    $('countValue').textContent = state.count;
    $('countGoal').textContent = `/ ${state.goal}`;
    $('goalInput').value = state.goal;

    const pct = Math.min(state.count / state.goal, 1);
    $('progressRing').style.strokeDashoffset = CIRC * (1 - pct);

    const overRing = $('overflowRing');
    if (state.count > state.goal) {
      const overPct = Math.min((state.count - state.goal) / state.goal, 1);
      overRing.style.strokeDashoffset = CIRC_INNER * (1 - overPct);
      overRing.classList.add('visible');
    } else {
      overRing.style.strokeDashoffset = CIRC_INNER;
      overRing.classList.remove('visible');
    }

    const btn = $('btnCount');
    const achieved = state.count >= state.goal;
    btn.classList.toggle('achieved', achieved);
    btn.textContent = achieved ? '+1' : '+1';

    state.history[state.today] = state.count;
    save();
    syncToCloud(state.today, state.count);
    updateRank();
  }

  function doCount() {
    state.count++;
    const wasBelow = (state.count - 1) < state.goal;
    updateCounter();
    if (state.count >= state.goal && wasBelow) celebrate();
    updateCalendar();
    updateStats();
    updateHistory();
  }

  $('btnCount').addEventListener('click', doCount);

  $('btnCount').addEventListener('touchend', e => {
    e.preventDefault();
    doCount();
  });

  $('btnUndo').addEventListener('click', () => {
    if (state.count > 0) {
      state.count--;
      updateCounter();
      updateCalendar();
      updateStats();
      updateHistory();
    }
  });

  $('btnReset').addEventListener('click', () => {
    if (state.count === 0) return;
    if (!confirm('今日のカウントをリセットしますか？')) return;
    state.count = 0;
    updateCounter();
    updateCalendar();
    updateStats();
    updateHistory();
  });

  $('btnGoalSave').addEventListener('click', () => {
    const v = parseInt($('goalInput').value);
    if (v > 0 && v <= 9999) {
      state.goal = v;
      updateCounter();
      updateCalendar();
      updateStats();
      updateHistory();
      syncGoalToCloud();
    }
  });

  $('goalInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('btnGoalSave').click();
  });

  // ── Rank ──
  function updateRank() {
    const pts = calcPoints(state.history, state.goal);
    const { rank, next } = getRank(pts);

    $('rankIcon').textContent = rank.icon;
    $('rankName').textContent = rank.name;
    $('ptsVal').textContent = pts.toLocaleString();

    if (next) {
      const ptsInRank = pts - rank.minPts;
      const ptsNeeded = next.minPts - rank.minPts;
      const pct = Math.min((ptsInRank / ptsNeeded) * 100, 100);
      $('rankSub').textContent = `次: ${next.name}`;
      $('xpCurrent').textContent = `${ptsInRank}pt`;
      $('xpNext').textContent = `あと ${next.minPts - pts}pt`;
      $('xpBarFill').style.width = pct + '%';
    } else {
      $('rankSub').textContent = 'MAX RANK';
      $('xpCurrent').textContent = '';
      $('xpNext').textContent = '最高ランク到達!';
      $('xpBarFill').style.width = '100%';
    }
  }

  // ── Calendar ──
  let calYear, calMonth;
  (function() {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
  })();

  $('calPrev').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } updateCalendar(); });
  $('calNext').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } updateCalendar(); });

  function updateCalendar() {
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    $('calMonth').textContent = `${calYear}年 ${months[calMonth]}`;

    const grid = $('calGrid');
    grid.innerHTML = '';

    ['月','火','水','木','金','土','日'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const first = new Date(calYear, calMonth, 1);
    let startDay = first.getDay() - 1;
    if (startDay < 0) startDay = 6;
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const todayString = todayStr();

    for (let i = 0; i < startDay; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;

      if (dateStr === todayString) el.classList.add('today');

      const cnt = state.history[dateStr];
      if (cnt !== undefined && cnt > 0) {
        el.classList.add(cnt >= state.goal ? 'achieved' : 'partial');
      }

      el.addEventListener('click', () => openEditModal(dateStr));
      grid.appendChild(el);
    }
  }

  // ── Edit Modal ──
  let editingDate = null;
  let editingCount = 0;

  function openEditModal(dateStr) {
    editingDate = dateStr;
    editingCount = state.history[dateStr] || 0;

    const d = new Date(dateStr + 'T00:00:00');
    const dow = ['日','月','火','水','木','金','土'][d.getDay()];
    $('modalDate').textContent = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (${dow})`;
    $('modalCount').textContent = editingCount;
    $('modalOverlay').classList.add('open');
  }

  function closeModal() {
    $('modalOverlay').classList.remove('open');
    editingDate = null;
  }

  $('modalPlus').addEventListener('click', () => {
    editingCount++;
    $('modalCount').textContent = editingCount;
  });

  $('modalMinus').addEventListener('click', () => {
    if (editingCount > 0) {
      editingCount--;
      $('modalCount').textContent = editingCount;
    }
  });

  $('modalCancel').addEventListener('click', closeModal);

  $('modalOverlay').addEventListener('click', e => {
    if (e.target === $('modalOverlay')) closeModal();
  });

  $('modalSave').addEventListener('click', () => {
    if (editingDate === state.today) {
      state.count = editingCount;
    }
    if (editingCount > 0) {
      state.history[editingDate] = editingCount;
    } else {
      delete state.history[editingDate];
    }
    save();
    syncToCloud(editingDate, editingCount);
    if (editingDate === state.today) updateCounter();
    updateCalendar();
    updateStats();
    updateHistory();
    closeModal();
  });

  // ── Stats ──
  function updateStats() {
    const achieved = Object.entries(state.history).filter(([,v]) => v >= state.goal);
    $('statTotal').textContent = achieved.length;

    let streak = 0, curr = 0;
    const today = new Date();
    for (let i = 0; i <= 365; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const cnt = state.history[ds];
      if (cnt !== undefined && cnt >= state.goal) {
        curr++;
      } else {
        if (i === 0) { curr = 0; continue; }
        break;
      }
    }
    streak = curr;

    let best = 0;
    curr = 0;
    Object.keys(state.history).sort().forEach(ds => {
      if (state.history[ds] >= state.goal) { curr++; if (curr > best) best = curr; }
      else curr = 0;
    });

    $('statStreak').textContent = streak;
    $('statBest').textContent = best;
    drawChart();
  }

  // ── Chart ──
  function drawChart() {
    const canvas = $('chartCanvas');
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;
    ctx.clearRect(0, 0, W, H);

    const days = 30;
    const today = new Date();
    const data = [], labels = [];

    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      data.push(state.history[ds] || 0);
      labels.push(`${d.getMonth()+1}/${d.getDate()}`);
    }

    const maxVal = Math.max(state.goal, ...data, 1);
    const padL = 40, padR = 12, padT = 16, padB = 32;
    const cW = W - padL - padR, cH = H - padT - padB;

    // grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = padT + (cH / 4) * i;
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(W - padR, y);
      ctx.stroke();
    }

    // goal line
    const goalY = padT + cH * (1 - state.goal / maxVal);
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(52,211,153,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(padL, goalY);
    ctx.lineTo(W - padR, goalY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#34d399';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`目標 ${state.goal}`, padL + 4, goalY - 6);

    // bars
    const barW = Math.max(3, (cW / days) * 0.55);
    const gap = cW / days;

    data.forEach((v, i) => {
      const x = padL + gap * i + gap / 2 - barW / 2;
      const h = v > 0 ? Math.max(3, (v / maxVal) * cH) : 0;
      const y = padT + cH - h;
      const achieved = v >= state.goal;

      if (achieved) {
        const grad = ctx.createLinearGradient(x, y, x, y + h);
        grad.addColorStop(0, '#34d399');
        grad.addColorStop(1, '#059669');
        ctx.fillStyle = grad;
      } else if (v > 0) {
        const grad = ctx.createLinearGradient(x, y, x, y + h);
        grad.addColorStop(0, '#a89eff');
        grad.addColorStop(1, '#6c63ff');
        ctx.fillStyle = grad;
      }

      if (v > 0) {
        ctx.beginPath();
        ctx.roundRect(x, y, barW, h, 3);
        ctx.fill();
      }
    });

    // x-axis
    ctx.fillStyle = '#c0c0d0';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    for (let i = 0; i < days; i += 5) {
      ctx.fillText(labels[i], padL + gap * i + gap / 2, H - 6);
    }
    ctx.fillText(labels[days - 1], padL + gap * (days - 1) + gap / 2, H - 6);

    // y-axis
    ctx.fillStyle = '#c0c0d0';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('0', padL - 6, padT + cH + 4);
    ctx.fillText(maxVal, padL - 6, padT + 10);
    const mid = Math.round(maxVal / 2);
    ctx.fillText(mid, padL - 6, padT + cH / 2 + 4);
  }

  // ── History ──
  function updateHistory() {
    const list = $('historyList');
    const entries = Object.entries(state.history)
      .filter(([,v]) => v > 0)
      .sort(([a],[b]) => b.localeCompare(a));

    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-state">まだ記録がありません</div>';
      return;
    }

    list.innerHTML = entries.map(([date, count]) => {
      const achieved = count >= state.goal;
      const d = new Date(date + 'T00:00:00');
      const label = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
      const dow = ['日','月','火','水','木','金','土'][d.getDay()];
      return `<div class="history-item" data-date="${date}">
        <span class="hi-date">${label} (${dow})</span>
        <span class="hi-count">${count} / ${state.goal} 回</span>
        <span class="hi-badge ${achieved ? 'achieved' : 'partial'}">${achieved ? '達成' : '途中'}</span>
      </div>`;
    }).join('');

    list.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => openEditModal(el.dataset.date));
    });
  }

  // ── Celebration ──
  function celebrate() {
    const toast = $('toast');
    toast.textContent = '目標達成!';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);

    const container = $('celebration');
    const colors = ['#7b6fff','#34d399','#fbbf24','#f472b6','#38bdf8','#fb923c'];
    for (let i = 0; i < 50; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + '%';
      el.style.top = -10 + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDelay = Math.random() * 0.5 + 's';
      el.style.animationDuration = (1 + Math.random()) + 's';
      container.appendChild(el);
    }
    setTimeout(() => { container.innerHTML = ''; }, 3000);
  }

  let resizeTimer;
  window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(drawChart, 200); });

  function refreshAll() {
    updateCounter();
    updateCalendar();
    updateStats();
    updateHistory();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  (async () => {
    await mergeCloudIntoLocal();
    refreshAll();
    await pushAllToCloud();

    setInterval(async () => {
      const ch = await mergeCloudIntoLocal();
      if (ch) refreshAll();
    }, SYNC_INTERVAL);
  })();

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      mergeCloudIntoLocal().then(ch => { if (ch) refreshAll(); });
    }
  });

  window.addEventListener('pageshow', (ev) => {
    if (ev.persisted) {
      mergeCloudIntoLocal().then(ch => { if (ch) refreshAll(); });
    }
  });
})();
</script>
</body>
